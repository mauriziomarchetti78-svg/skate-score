<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff3d7f"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2236"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#g2)"/>
  <!-- Gradient ring -->
  <circle cx="256" cy="256" r="151" fill="none" stroke="url(#g1)" stroke-width="20" opacity="0.5"/>
  <!-- Top bar accent -->
  <rect x="0" y="0" width="512" height="28" rx="112" fill="url(#g1)"/>
  <!-- Bottom bar accent -->
  <rect x="0" y="483" width="512" height="28" rx="0" fill="url(#g1)"/>
  <!-- Skate emoji area -->
  <text x="256" y="318" text-anchor="middle" font-size="179" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">🛼</text>
  <!-- SKATE text -->
  <text x="256" y="399" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="58" fill="#ffffff" letter-spacing="12">SKATE</text>
  <!-- SCORE text -->
  <text x="256" y="455" text-anchor="middle" font-family="Georgia,serif" font-weight="400" font-size="48" fill="#ff6b35" letter-spacing="15">SCORE</text>
</svg>